<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Requests - Flood Relief</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="theme-init.js"></script>
</head>
<body>

<header>
    <div class="container header__inner">
        <div class="brand">
            <p class="brand__title">Flood Relief System</p>
            <p class="brand__tagline">View help requests</p>
        </div>
        <nav aria-label="Primary" id="primaryNav">
            <button class="icon-btn nav__close" type="button" id="navClose">
                <i class="bi bi-x-lg"></i>
            </button>
            <a class="nav__link" href="home.html">Home</a>
            <a class="nav__link" href="request.html">Request Help</a>
            <a class="nav__link is-active" href="viewrequests.html">View Requests</a>
            <a class="nav__link" href="chat.html">Chat</a>
            <a class="nav__link" href="reviews.html">Reviews</a>
        </nav>
        <div class="header__actions">
            <button class="icon-btn nav-toggle" type="button" id="navToggle">
                <i class="bi bi-list"></i>
            </button>
            <button class="icon-btn" type="button" id="themeToggle">
                <span id="themeIcon">☀</span>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <h2>All Help Requests</h2>
        
        <div id="loadingRequests" style="text-align:center; padding:50px;">
            Loading requests...
        </div>
        
        <div id="requestsList" style="display:none;">
            <!-- Requests will appear here -->
        </div>
        
        <div id="noRequests" style="display:none; text-align:center; padding:50px;">
            <p>No help requests found.</p>
            <a href="request.html" class="btn btn--primary">Submit a Request</a>
        </div>
    </div>
</main>

<footer>
    <div class="container footer__inner">
        <p>© 2026 Flood Relief System - Helping communities in crisis</p>
    </div>
</footer>

<script>
const API_URL = 'https://floodrelife-web-project-production.up.railway.app';

async function loadRequests() {
    const token = localStorage.getItem('token');
    
    if (!token) {
        alert('Please login first!');
        window.location.href = 'login.html';
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/api/requests`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        
        if (response.ok) {
            const requests = await response.json();
            displayRequests(requests);
        } else {
            document.getElementById('loadingRequests').style.display = 'none';
            document.getElementById('noRequests').style.display = 'block';
        }
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingRequests').innerHTML = 'Error loading requests. Please try again.';
    }
}

function displayRequests(requests) {
    document.getElementById('loadingRequests').style.display = 'none';
    
    if (!requests || requests.length === 0) {
        document.getElementById('noRequests').style.display = 'block';
        return;
    }
    
    const container = document.getElementById('requestsList');
    container.style.display = 'block';
    container.innerHTML = '';
    
    requests.forEach(req => {
        const card = document.createElement('div');
        card.className = 'form-card';
        card.style.marginBottom = '20px';
        card.innerHTML = `
            <div style="padding: 20px;">
                <h3>${req.fullName || 'Anonymous'}</h3>
                <p><strong>📍 Location:</strong> ${req.location || 'Not specified'}</p>
                <p><strong>🆘 Help Type:</strong> ${req.helpType || 'Not specified'}</p>
                <p><strong>📞 Phone:</strong> ${req.phone || 'Not provided'}</p>
                ${req.whatsapp ? `<p><strong>💬 WhatsApp:</strong> ${req.whatsapp}</p>` : ''}
                ${req.situation ? `<p><strong>📝 Description:</strong> ${req.situation}</p>` : ''}
                <p><strong>📅 Submitted:</strong> ${new Date(req.createdAt).toLocaleString()}</p>
                <p><strong>📊 Status:</strong> <span style="background:#ffd60a; padding:2px 8px; border-radius:20px;">${req.status || 'pending'}</span></p>
            </div>
        `;
        container.appendChild(card);
    });
}

// Load requests when page loads
document.addEventListener('DOMContentLoaded', loadRequests);
</script>

<script src="app.js"></script>
</body>
</html>
