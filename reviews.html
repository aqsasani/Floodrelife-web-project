<body>

<header>
  <div class="container header__inner">

    <div class="brand">

    <nav aria-label="Primary" id="primaryNav">

      <a class="nav__link" href="home.html">Home</a>
      <a class="nav__link" href="request.html">Request Help</a>

<main>
<div class="container">

<!-- ADD REVIEW -->
<div class="form-card">
  <h3 style="padding: 16px 18px 0;">Add Review</h3>

  <form>
    <input type="text" placeholder="Your Name">

    <select>
      <option>⭐⭐⭐⭐⭐</option>
      <option>⭐⭐⭐⭐</option>
      <option>⭐⭐⭐</option>

    <button class="btn btn--primary">Submit Review</button>
  </form>
</div>

<!-- REVIEWS LIST -->
<div class="form-card" style="margin-top:20px;">

  <h3 style="padding: 16px 18px 0;">All Reviews</h3>

  <div class="review-item" style="padding: 0 18px;">
    <p><b>Ali</b> ⭐⭐⭐⭐⭐</p>
    <p>Very helpful platform. Got food support quickly.</p>
  </div>

  <div class="review-item" style="padding: 0 18px;">
    <p><b>Sara</b> ⭐⭐⭐⭐</p>
    <p>Good experience, people are supportive.</p>

</div>
