<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Help - Flood Relief</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="theme-init.js"></script>
</head>
<body>

<header>
    <div class="container header__inner">
        <div class="brand">
            <p class="brand__title">Flood Relief System</p>
            <p class="brand__tagline">Request urgent support</p>
        </div>
        <nav aria-label="Primary" id="primaryNav">
            <button class="icon-btn nav__close" type="button" id="navClose">
                <i class="bi bi-x-lg"></i>
            </button>
            <a class="nav__link" href="home.html">Home</a>
            <a class="nav__link is-active" href="request.html">Request Help</a>
            <a class="nav__link" href="viewrequests.html">View Requests</a>
            <a class="nav__link" href="chat.html">Chat</a>
            <a class="nav__link" href="reviews.html">Reviews</a>
        </nav>
        <div class="header__actions">
            <button class="icon-btn nav-toggle" type="button" id="navToggle">
                <i class="bi bi-list"></i>
            </button>
            <button class="icon-btn" type="button" id="themeToggle">
                <span id="themeIcon">☀</span>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="form-container">
        <div class="container">
            <div class="form-card">
                <div class="form-card__header">
                    <h2>Request Help</h2>
                    <p>Fill the form below to get support from volunteers.</p>
                </div>

                <!-- NO FORM TAGS! Just a div -->
                <div id="requestForm">
                    <div class="form-grid">
                        <div class="field">
                            <label for="fullName">Full Name</label>
                            <input id="fullName" type="text" placeholder="Full Name" required />
                        </div>

                        <div class="field">
                            <label for="phone">Phone Number</label>
                            <input id="phone" type="tel" placeholder="Phone Number" required />
                        </div>

                        <div class="field">
                            <label for="whatsapp">WhatsApp Number</label>
                            <input id="whatsapp" type="tel" placeholder="WhatsApp Number" />
                        </div>

                        <div class="field">
                            <label for="location">City / Location</label>
                            <input id="location" type="text" placeholder="Enter City / Area / Village" required />
                        </div>

                        <div class="field">
                            <label for="helpType">Help Type</label>
                            <select id="helpType" required>
                                <option value="" disabled selected>Select Help Type</option>
                                <option value="Money">Money</option>
                                <option value="Food">Food</option>
                                <option value="Clothes">Clothes</option>
                                <option value="Medicine">Medicine</option>
                            </select>
                        </div>

                        <div class="field">
                            <label for="paymentNumber">JazzCash / EasyPaisa Number</label>
                            <input id="paymentNumber" type="tel" placeholder="Payment Number" />
                        </div>

                        <div class="field field--full">
                            <label for="situation">Describe your situation</label>
                            <textarea id="situation" placeholder="Explain your situation in detail"></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="btn btn--primary" type="button" onclick="submitHelpRequest()">
                            <i class="bi bi-send btn__icon"></i>Submit Request
                        </button>
                    </div>
                </div>

                <div id="loadingMsg" style="display:none; text-align:center; padding:20px; background:#ffd60a; margin-top:20px;">
                    Submitting your request...
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="container footer__inner">
        <p>© 2026 Flood Relief System - Your request matters</p>
    </div>
</footer>

<script>
// API URL
const API_URL = 'https://floodrelife-web-project-production.up.railway.app';

// Check if user is logged in
function checkLogin() {
    const token = localStorage.getItem('token');
    if (!token) {
        alert('Please login first!');
        window.location.href = 'login.html';
        return false;
    }
    return token;
}

// Submit help request
async function submitHelpRequest() {
    console.log('Submit button clicked');
    
    const token = checkLogin();
    if (!token) return;
    
    // Get form values
    const fullName = document.getElementById('fullName').value;
    const phone = document.getElementById('phone').value;
    const whatsapp = document.getElementById('whatsapp').value;
    const location = document.getElementById('location').value;
    const helpType = document.getElementById('helpType').value;
    const paymentNumber = document.getElementById('paymentNumber').value;
    const situation = document.getElementById('situation').value;
    
    // Validate
    if (!fullName || !phone || !location || !helpType) {
        alert('Please fill all required fields!');
        return;
    }
    
    const requestData = {
        fullName: fullName,
        phone: phone,
        whatsapp: whatsapp || '',
        location: location,
        helpType: helpType,
        paymentMethod: paymentNumber || '',
        situation: situation || ''
    };
    
    console.log('Sending data:', requestData);
    
    // Show loading
    document.getElementById('loadingMsg').style.display = 'block';
    
    try {
        const response = await fetch(`${API_URL}/api/requests`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(requestData)
        });
        
        const result = await response.json();
        console.log('Response:', result);
        
        if (response.ok) {
            alert('✅ Help request submitted successfully!');
            window.location.href = 'viewrequests.html';
        } else {
            alert('❌ Error: ' + (result.message || 'Something went wrong'));
            document.getElementById('loadingMsg').style.display = 'none';
        }
    } catch (error) {
        console.error('Error:', error);
        alert('❌ Network error: ' + error.message);
        document.getElementById('loadingMsg').style.display = 'none';
    }
}
</script>

<script src="app.js"></script>
</body>
</html>
