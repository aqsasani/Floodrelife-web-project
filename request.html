<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Request Help</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  
  <script src="theme-init.js?v=1"></script>
  <link rel="stylesheet" href="style.css?v=1" />
</head>

<body>

<div class="page-loader" aria-hidden="true">
  <div class="page-loader__bar"></div>
</div>

<div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

<div class="app-shell">

<header>
  <div class="container header__inner">

    <div class="brand">
      <p class="brand__title">Flood Relief System</p>
      <p class="brand__tagline">Request urgent support</p>
    </div>

    <nav aria-label="Primary" id="primaryNav">
      <button class="icon-btn nav__close" type="button" id="navClose">
        <i class="bi bi-x-lg"></i>
      </button>

      <a class="nav__link" href="home.html">Home</a>
      <a class="nav__link is-active" href="request.html">Request Help</a>
      <a class="nav__link" href="viewrequests.html">View Requests</a>
      <a class="nav__link" href="chat.html">Chat</a>
      <a class="nav__link" href="reviews.html">Reviews</a>
    </nav>

    <div class="header__actions">
      <button class="icon-btn nav-toggle" type="button" id="navToggle">
        <i class="bi bi-list"></i>
      </button>
      <button class="icon-btn" type="button" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span aria-hidden="true" id="themeIcon">☀</span>
      </button>
    </div>

  </div>
</header>

<main>

  <div class="form-container">
    <div class="container">

      <div class="form-card">

        <div class="form-card__header">
          <h2>Request Help</h2>
          <p>Fill the form below to get support from volunteers.</p>
        </div>

        <form>

          <div class="form-grid">

            <!-- NAME -->
            <div class="field">
              <label for="fullName">Full Name</label>
              <input id="fullName" name="fullName" type="text" placeholder="Full Name" required />
            </div>

            <!-- PHONE -->
            <div class="field">
              <label for="phone">Phone Number</label>
              <input id="phone" name="phone" type="tel" placeholder="Phone Number" required />
            </div>

            <!-- WHATSAPP -->
            <div class="field">
              <label for="whatsapp">WhatsApp Number</label>
              <input id="whatsapp" name="whatsapp" type="tel" placeholder="WhatsApp Number" />
            </div>

            <!-- LOCATION (IMPROVED) -->
            <div class="field">
              <label for="location">City / Location</label>
              <input id="location" name="location" type="text" placeholder="Enter City / Area / Village" required />

              <small style="color:gray;">
                Add exact area for faster help (street, village, landmark)
              </small>
            </div>

            <!-- HELP TYPE -->
            <div class="field">
              <label for="helpType">Help Type</label>
              <select id="helpType" name="helpType" required>
                <option value="" disabled selected>Select Help Type</option>
                <option value="Money">Money</option>
                <option value="Food">Food</option>
                <option value="Clothes">Clothes</option>
              </select>
            </div>

            <!-- IMAGE UPLOAD (NEW) -->
            <div class="field">
              <label for="image">Upload Image (Situation Proof)</label>
              <input id="image" name="image" type="file" accept="image/*" />
            </div>

            <!-- PAYMENT -->
            <div class="field">
              <label for="paymentNumber">JazzCash / EasyPaisa Number</label>
              <input id="paymentNumber" name="paymentNumber" type="tel" placeholder="Payment Number" />
            </div>

            <!-- DESCRIPTION -->
            <div class="field field--full">
              <label for="situation">Describe your situation</label>
              <textarea id="situation" name="situation" placeholder="Explain your situation in detail"></textarea>
            </div>

          </div>

          <!-- SUBMIT -->
          <div class="form-actions">
            <button class="btn btn--primary" type="submit">
              <i class="bi bi-send btn__icon"></i>Submit Request
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>

</main>

<footer>
  <div class="container footer__inner">
    <p style="margin:0;">© 2026 Flood Relief System</p>
    <p style="margin:0;">Your request matters</p>
  </div>
</footer>

</div>

<script src="app.js?v=1"></script>

</body>
</html>
